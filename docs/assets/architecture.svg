<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ISLES pipeline architecture</title>
  <desc id="desc">Flow from ISLES MRI data to preprocessing, 3D U-Net training, and evaluation sweeps.</desc>
  <rect width="1200" height="360" fill="#0f172a"/>
  <text x="60" y="52" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">ISLES 2022 pipeline overview</text>
  <text x="60" y="86" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="18">DWI / ADC MRI → preprocessing → 3D U-Net → threshold / postprocess sweep → segmentation metrics</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="60" y="130" rx="18" ry="18" width="220" height="140" fill="#1d4ed8"/>
    <text x="92" y="178" fill="#ffffff" font-size="24" font-weight="700">ISLES MRI</text>
    <text x="92" y="212" fill="#dbeafe" font-size="18">DWI + ADC volumes</text>
    <text x="92" y="238" fill="#dbeafe" font-size="18">derivative masks</text>

    <rect x="330" y="130" rx="18" ry="18" width="220" height="140" fill="#0f766e"/>
    <text x="360" y="178" fill="#ffffff" font-size="24" font-weight="700">Preprocess</text>
    <text x="360" y="212" fill="#ccfbf1" font-size="18">resample / normalize</text>
    <text x="360" y="238" fill="#ccfbf1" font-size="18">processed tensors</text>

    <rect x="600" y="130" rx="18" ry="18" width="220" height="140" fill="#7c3aed"/>
    <text x="650" y="178" fill="#ffffff" font-size="24" font-weight="700">3D U-Net</text>
    <text x="650" y="212" fill="#ede9fe" font-size="18">train / infer</text>
    <text x="650" y="238" fill="#ede9fe" font-size="18">DWI + ADC focus</text>

    <rect x="870" y="130" rx="18" ry="18" width="270" height="140" fill="#be123c"/>
    <text x="900" y="178" fill="#ffffff" font-size="24" font-weight="700">Evaluation sweep</text>
    <text x="900" y="212" fill="#ffe4e6" font-size="18">Dice / HD95 / threshold</text>
    <text x="900" y="238" fill="#ffe4e6" font-size="18">small-lesion tracking</text>
  </g>
  <g stroke="#94a3b8" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M280 200 H320"/>
    <path d="M550 200 H590"/>
    <path d="M820 200 H860"/>
  </g>
</svg>
